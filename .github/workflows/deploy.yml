name: Deploy Python Worker to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP Project
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to VM
        run: |
          gcloud compute ssh chillgram-pythonworker \
            --zone=us-west1-b \
            --tunnel-through-iap \
            --command='
              set -e
          
              echo "🚀 Starting deployment..."
          
              cd ~
              echo "🧹 Removing old CHILLGRAM_AI..."
              sudo rm -rf CHILLGRAM_AI || true
          
              echo "📥 Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git CHILLGRAM_AI
              cd CHILLGRAM_AI
          
              echo "📝 Creating .env file..."
              echo "${{ secrets.ENV_FILE }}" | sudo tee .env > /dev/null
              sudo chmod 644 .env
          
              echo "🔑 Creating GCS credentials..."
              sudo mkdir -p /opt/chillgram/secrets
              sudo chmod 755 /opt/chillgram/secrets
              
              # 기존 파일 삭제
              sudo rm -f /opt/chillgram/secrets/gcs.json

              # 새 파일 생성
              echo "${{ secrets.GCP_WORKER_SA_KEY_JSON }}" | sudo tee /opt/chillgram/secrets/gcs.json > /dev/null
              
              # 모든 사용자가 읽을 수 있도록 설정 (chown이 불안정한 환경 대응)
              sudo chmod 644 /opt/chillgram/secrets/gcs.json
              
              # 권한 확인 (디버깅용)
              echo "🔍 Checking file permissions..."
              sudo ls -la /opt/chillgram/secrets/gcs.json
              
              # JSON 파일 문법 검증
              if ! sudo python3 -m json.tool /opt/chillgram/secrets/gcs.json > /dev/null 2>&1; then
                echo "❌ Invalid GCS credentials JSON"
                sudo cat /opt/chillgram/secrets/gcs.json | head -3
                exit 1
              fi
              echo "✅ GCS credentials validated"
          
              echo "🔧 Fixing permissions for ./ai volume..."
              sudo mkdir -p ai/tmp/basic
              sudo chown -R 1005:1006 ai
              sudo chmod -R 775 ai
          
              echo "🐳 Building Docker image..."
              sudo docker build --no-cache -t python-worker:latest .
          
              echo "🛑 Stopping old container..."
              sudo docker stop python-worker 2>/dev/null || true
              sudo docker rm -f python-worker 2>/dev/null || true
          
              echo "▶️ Starting new container..."
              sudo docker run -d \
                --name python-worker \
                --restart always \
                --user 1005:1006 \
                --env-file "$(pwd)/.env" \
                -v "$(pwd)/ai:/app/ai" \
                -v /opt/chillgram/secrets/gcs.json:/secrets/gcs.json:ro \
                -e GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs.json \
                -e NUMBA_CACHE_DIR=/tmp \
                python-worker
          
              echo "⏳ Waiting for container to start..."
              sleep 5
              
              echo "📋 Container logs:"
              sudo docker logs python-worker --tail 30 || true
          
              echo "🔍 Verifying GCS credentials inside container..."
              if sudo docker exec python-worker test -r /secrets/gcs.json; then
                echo "✅ GCS credentials accessible in container"
              else
                echo "❌ GCS credentials NOT accessible in container"
                exit 1
              fi
          
              echo "✅ Deployment complete!"
            '

      - name: Verify Deployment
        run: |
          echo "🔍 Checking container status..."
          gcloud compute ssh chillgram-pythonworker \
            --zone=us-west1-b \
            --tunnel-through-iap \
            --command='
              set -e
              echo "== docker ps (filtered) =="
              sudo docker ps --filter "name=^/python-worker$" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
          
              if sudo docker ps --filter "name=^/python-worker$" --format "{{.Names}}" | grep -qx "python-worker"; then
                echo "✅ python-worker is running"
              else
                echo "❌ python-worker is NOT running"
                sudo docker ps -a --filter "name=^/python-worker$" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
                sudo docker logs python-worker --tail 200 || true
                exit 1
              fi
            '