- name: Deploy to VM
  run: |
    gcloud compute ssh chillgram-pythonworker \
      --zone=us-west1-b \
      --tunnel-through-iap \
      --command 'bash -lc "
  set -euo pipefail
  
  cat > /tmp/deploy_python_worker.sh <<'\''SCRIPT'\''
  set -euo pipefail
  
  echo \"🚀 Starting deployment...\"
  
  echo \"🛑 Stopping old container...\"
  sudo docker stop python-worker 2>/dev/null || true
  sudo docker rm -f python-worker 2>/dev/null || true
  
  cd ~
  echo \"🧹 Removing old CHILLGRAM_AI...\"
  sudo rm -rf CHILLGRAM_AI || true
  
  echo \"📥 Cloning repository...\"
  git clone https://github.com/${{ github.repository }}.git CHILLGRAM_AI
  cd CHILLGRAM_AI
  
  echo \"📝 Creating .env file...\"
  printf \"%s\" \"${{ secrets.ENV_FILE }}\" | sudo tee .env >/dev/null
  sudo chmod 600 .env
  
  echo \"🔑 Creating GCS credentials...\"
  sudo mkdir -p /opt/chillgram/secrets
  sudo chmod 700 /opt/chillgram/secrets
  printf \"%s\" \"${{ secrets.GCP_WORKER_SA_KEY_JSON }}\" | sudo tee /opt/chillgram/secrets/gcs.json >/dev/null
  sudo chmod 600 /opt/chillgram/secrets/gcs.json
  
  echo \"🔧 Fixing permissions for ./ai volume...\"
  sudo mkdir -p ai/tmp/basic
  sudo chown -R 1005:1006 ai
  sudo chmod -R 775 ai
  
  echo \"🐳 Building Docker image...\"
  sudo docker build -t python-worker .
  
  echo \"▶️ Starting new container...\"
  sudo docker run -d \
  --name python-worker \
  --restart always \
  --user 1005:1006 \
  --env-file \"$(pwd)/.env\" \
  -v \"$(pwd)/ai:/app/ai\" \
  -v /opt/chillgram/secrets/gcs.json:/secrets/gcs.json:ro \
  -e GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs.json \
  python-worker
  
  echo \"📋 Container logs:\"
  sleep 3
  sudo docker logs python-worker --tail 50 || true
  
  echo \"✅ Deployment complete!\"
  SCRIPT
  
  chmod +x /tmp/deploy_python_worker.sh
  bash /tmp/deploy_python_worker.sh
  "'
