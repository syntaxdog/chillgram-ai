name: Deploy Python Worker to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    
    - name: Set GCP Project
      run: |
        gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
    
    - name: Deploy to VM
      run: |
        gcloud compute ssh chillgram-pythonworker \
          --zone=us-west1-b \
          --tunnel-through-iap \
          --command='
            set -e
            
            echo "🚀 Starting deployment..."
            
            cd ~
            rm -rf CHILLGRAM_AI
            
            echo "📥 Cloning repository..."
            git clone https://github.com/${{ github.repository }}.git CHILLGRAM_AI
            cd CHILLGRAM_AI
            
            echo "📝 Creating .env file..."
            cat > .env << "ENV_EOF"
            ${{ secrets.ENV_FILE }}
            ENV_EOF
            
             # gcloud-key.json 생성
            echo "🔑  Creating GCS credentials..."
            sudo mkdir -p /opt/chillgram/secrets
            sudo chmod 700 /opt/chillgram/secrets

            sudo tee /opt/chillgram/secrets/gcs.json > /dev/null << "JSON_EOF"
            ${{ secrets.GCP_WORKER_SA_KEY_JSON }}
            JSON_EOF

            sudo chmod 600 /opt/chillgram/secrets/gcs.json
            
            echo "🐳 Building Docker image..."
            sudo docker build -t python-worker .
            
            echo "🛑 Stopping old container..."
            sudo docker stop python-worker 2>/dev/null || true
            sudo docker rm python-worker 2>/dev/null || true
            
            echo "▶️ Starting new container..."
            sudo docker run -d \
              --name python-worker \
              --restart always \
              --env-file $(pwd)/.env \
              -v $(pwd)/ai:/app/ai \
              -v /opt/chillgram/secrets/gcs.json:/secrets/gcs.json:ro \
              -e GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs.json \
              python-worker
            
            echo "📋 Container logs:"
            sleep 3
            sudo docker logs python-worker --tail 20
            
            echo "✅ Deployment complete!"
          '
    
    - name: Verify Deployment
      run: |
        echo "🔍 Checking container status..."
        gcloud compute ssh chillgram-pythonworker \
          --zone=us-west1-b \
          --tunnel-through-iap \
          --command='sudo docker ps | grep python-worker'
